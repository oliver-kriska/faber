# Friction signatures — extracted BY REFERENCE from the plugin's session-retrospective
# scoring (session-scan skill: references/scoring-guide.md + compute-metrics.py). Zero
# diffs to the plugin.
#
# Native algorithm (for fidelity): friction_score = sigmoid(Σ signal_value × native_weight)
# with k = 3.0, midpoint = 1.5. The `weight` field below is that native weight normalized
# to the contract's 0.0–1.0 scale (native / 3.0); the native weight is restated in each
# body so the engine can reproduce the exact score. Bulk form per ADAPTER_CONTRACT.md §5.1.
#
# These signatures target claude-code transcripts (the adapter's agent_target). The engine
# layers them on top of its generic friction signals.

signatures:
  - id: retry-loops
    severity: high
    weight: 1.0            # native 3.0
    body: >-
      The same Bash command prefix run 3+ times consecutively — the strongest friction
      signal (native weight 3.0). Indicates the agent is stuck repeating an action without
      progress, the prime candidate for an automating skill.

  - id: user-corrections
    severity: high
    weight: 0.83           # native 2.5
    body: >-
      User messages that correct or redirect the agent (native weight 2.5). Detected on the
      first 500 chars of each user message with the regex:
      \b(no[,.]?\s|wrong|instead|actually|that's not|not what I|I meant|I said|please don't|
      stop|undo|revert)\b

  - id: error-tool-ratio
    severity: medium
    weight: 0.67           # native 2.0
    body: >-
      Ratio of error results to total tool calls (error_count / tool_count), native weight
      2.0. A high ratio means the agent's actions are frequently failing.

  - id: approach-changes
    severity: medium
    weight: 0.67           # native 2.0
    body: >-
      Dominant-tool shifts across the session (native weight 2.0). Split the tool-call
      sequence into 4 equal chunks, find the dominant tool in each, count transitions
      between different dominant tools — thrashing between strategies signals friction.

  - id: context-compactions
    severity: medium
    weight: 0.5            # native 1.5
    body: >-
      System messages indicating context compaction occurred (native weight 1.5). Long,
      grinding sessions that exhaust the context window.

  - id: interrupted-requests
    severity: low
    weight: 0.33           # native 1.0
    body: >-
      Occurrences of "[Request interrupted by user]" (native weight 1.0). The user aborted
      the agent mid-action — a mild friction signal.

# ── Detection vocab (contract §4.1) ──────────────────────────────────────────
# Extracted BY REFERENCE from the plugin's compute-metrics.py (compute_fingerprint /
# compute_plugin_opportunity) and the plugin's `phx|ecto|lv` skill namespaces. These restate
# the engine's historical Elixir/plugin defaults as adapter data, so the engine itself stays
# domain-free while faber-elixir's behavior is unchanged (proven by the parity test).

# Command/tool → session-type bonus (compute_fingerprint's mix-deps/hex and gh-pr/issue
# command bonuses, plus its Tidewave-MCP → bug-fix bonus as a `tools:` prefix rule).
fingerprints:
  - type: maintenance
    commands: ["mix deps", "mix hex"]
    bonus: 3.0
  - type: review
    commands: ["gh pr", "gh issue"]
    bonus: 3.0
  - type: bug-fix
    tools: ["mcp__tidewave"] # Tidewave MCP usage = live runtime debugging
    bonus: 1.5

# Missed-automation → plugin skill (compute_plugin_opportunity). Order is the reported order.
opportunities:
  - skill: investigate
    when: retry_loops
    unless_used: false          # the source suggests investigate even when already used
  - skill: plan
    when: tool_count
    threshold: 50
  - skill: verify
    when: commands
    commands: ["mix test", "mix compile"]
    threshold: 3
  - skill: pr-review
    when: commands
    commands: ["gh pr"]
    threshold: 2
  - skill: review
    when: edit_count
    threshold: 10

# The plugin's skill-command namespaces, scanned as `(?:phx|ecto|lv):skill` in session text.
skill_namespaces: ["phx", "ecto", "lv"]
