name: ci

# Quality gate for every push/PR — the CI half of `mix verify` (Iron Law #22).
#
# `check` runs format/compile/credo plus `mix test.full`: the hermetic suite PLUS the
# :sidecar/:ccrider/:opencode tags (ubuntu-latest ships python3 and sqlite3, so the native↔python
# matcher parity test always runs here), and the Python sidecar's own suite. The :live/:live_api
# tags stay excluded — they need a real `claude` CLI / paid API key.
#
# `dialyzer` is a separate job purely because it's the slow one: it runs in parallel with `check`
# rather than adding PLT-build minutes to the critical path. Both pin MIX_ENV=test so they analyse
# the same beams `mix verify` does locally.
#
# Actions are pinned to commit SHAs, not tags: a tag is mutable, so `@v4` is a standing grant of
# arbitrary code execution in CI to whoever can move it. The trailing comment is the human-readable
# version — update both together. (These stay on the v4/v1 lines deliberately; bumping majors is a
# separate, testable change.)

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Don't burn runners on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  # Bump to bust every cache below (e.g. after an OTP/Elixir jump or a cache-layout change).
  CACHE_VERSION: v1

jobs:
  check:
    name: Format, Credo, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Erlang + Elixir come from .tool-versions (single source of truth, shared with local mise
      # and the release workflow).
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            deps
            _build
          key: ${{ env.CACHE_VERSION }}-mix-check-${{ runner.os }}-${{ hashFiles('.tool-versions', 'mix.lock') }}
          restore-keys: ${{ env.CACHE_VERSION }}-mix-check-${{ runner.os }}-

      - run: mix deps.get

      # `mix verify` formats in place for the local loop; CI must fail instead of fixing.
      - run: mix format --check-formatted

      - run: mix compile --warnings-as-errors

      - run: mix credo --strict

      - run: mix test.full

      - name: Python sidecar tests (stdlib-only)
        working-directory: python
        run: python3 -m unittest discover -s tests

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          version-file: .tool-versions
          version-type: strict

      # Split restore/save (rather than actions/cache) so the PLT survives a RED run. `actions/cache`
      # only saves in a post-step that is skipped when the job fails, and `mix dialyzer` halts with
      # status 2 on findings — so a combined build+analyse step would throw away the PLT it just
      # built on every red push, i.e. exactly while you're iterating on dialyzer findings.
      #
      # The PLT lives in `_build/plts` (see mix.exs dialyzer/0), so this one cache covers deps, beams
      # and the PLT — keyed on exactly what invalidates a PLT: the dep set and the OTP/Elixir version.
      # A prefix-matched restore is still useful: dialyxir updates a stale PLT incrementally, which is
      # far cheaper than building one from scratch.
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: mix-cache
        with:
          path: |
            deps
            _build
          key: ${{ env.CACHE_VERSION }}-mix-dialyzer-${{ runner.os }}-${{ hashFiles('.tool-versions', 'mix.lock') }}
          restore-keys: ${{ env.CACHE_VERSION }}-mix-dialyzer-${{ runner.os }}-

      - run: mix deps.get

      - run: mix compile

      # Build the PLT in its own step so the save below is reached before anything can halt.
      - run: mix dialyzer --plt

      # Saved BEFORE the analysis: a later failing step cannot undo a step that already ran, so the
      # PLT is banked either way. Skipped on an exact hit — the key already holds this PLT (the save
      # would only log "cache already exists"). A prefix-only restore reports cache-hit false, which
      # is what we want: the incrementally-updated PLT gets stored under the new exact key.
      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        if: steps.mix-cache.outputs.cache-hit != 'true'
        with:
          path: |
            deps
            _build
          key: ${{ steps.mix-cache.outputs.cache-primary-key }}

      # --format github emits ::warning file=...,line=... so findings land as inline PR annotations.
      # The job still fails on findings via dialyxir's halt(2) — the annotations are not the gate.
      - run: mix dialyzer --format github

  # ── release: green main → tag → binaries → draft (a human publishes) ────────────────────────
  # enaia's shape (tag_version → draft_release, publish is the manual gate), with the binary build
  # spliced in between so the draft a human reviews already carries the artifacts.

  tag_version:
    name: Tag version
    if: github.ref == 'refs/heads/main'
    needs: [check, dialyzer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # tag history is how the action computes the next version

      - id: version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          # No tag for a push that carries no feat:/fix:/BREAKING commit — the action would
          # otherwise bump a patch for every chore:/docs:/test: push and cut a 3-target Burrito
          # build each time. `new_tag` is empty on those runs and the two jobs below skip.
          default_bump: false

  release_binaries:
    name: Release binaries
    needs: [tag_version]
    if: needs.tag_version.outputs.new_tag != ''
    permissions:
      contents: write
    # Called, not triggered by the tag push: a tag created with GITHUB_TOKEN does not start a new
    # workflow run, so `on: push: tags` in release.yml would never fire for an auto-cut tag.
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag_version.outputs.new_tag }}

  draft_release:
    name: Draft release notes
    needs: [tag_version, release_binaries]
    if: needs.tag_version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Runs LAST on purpose: release_binaries' upload writes an empty body, so the notes are
      # applied afterwards and win. NOTE: release-drafter derives $CHANGES from merged PRs, and
      # Faber has none — expect an empty "What's Changed" until PRs are used. See
      # .github/release-drafter.yml.
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        with:
          config-name: release-drafter.yml
          tag: ${{ needs.tag_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
